baseURL: "https://danyvidaletti.github.io/"
title: "Danyela Vidaletti"
theme: PaperMod
languageCode: "en-us"

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "DV"
  description: "Where sales operations meets analytical rigor."
  author: "Danyela Vidaletti"
  defaultTheme: light
  ShowReadingTime: false
  ShowShareButtons: false
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: false
  disableSpecial1stPost: true

  homeInfoParams:
    Title: "Where sales operations meets analytical rigor."
    Content: >
      I'm **Danyela Vidaletti** — a Data & Insights Analyst at **LinkedIn**, working alongside Sales Operations and Compensation leaders to bring clarity, structure and measurable outcomes to global sales programmes.


      My work sits where SQL, dashboards and CRM meet quota, pipeline and GTM strategy. A background in Law and Compliance shapes how I treat data: with rigor, governance, and an eye for the decision waiting on the other side of the number.

  socialIcons:
    - name: linkedin
      url: "https://linkedin.com/in/danyvidaletti"
    - name: github
      url: "https://github.com/danyvidaletti"
    - name: email
      url: "mailto:dapvidaletti@gmail.com"

  assets:
    disableHLJS: false
    favicon: "/favicon.ico"

menu:
  main:
    - identifier: about
      name: About
      url: /#about
      weight: 10
    - identifier: portfolio
      name: Portfolio
      url: /#portfolio
      weight: 20
    - identifier: skills
      name: Skills
      url: /#skills
      weight: 30
    - identifier: experience
      name: Experience
      url: /#experience
      weight: 40
    - identifier: education
      name: Education
      url: /#education
      weight: 50
    - identifier: languages
      name: Languages
      url: /#languages
      weight: 60
    - identifier: contact
      name: Contact
      url: /#contact
      weight: 70

outputs:
  home:
    - HTML
    - RSS
    - JSON
