{{- define "main" }}

<article class="dv-project">
  <header class="dv-project-hero">
    <p class="dv-project-eyebrow">{{ delimit .Params.tags " · " }}</p>
    <h1 class="dv-project-title reveal">{{ .Title }}</h1>
    {{ with .Params.summary }}
    <p class="dv-project-lead reveal">{{ . }}</p>
    {{ end }}
    <a href="/#portfolio" class="dv-project-back">← Back to all projects</a>
  </header>

  <div class="dv-project-content">
    {{ .Content }}
  </div>
</article>

<script>
  (function () {
    if (!('IntersectionObserver' in window)) {
      document.querySelectorAll('.reveal').forEach(function (el) { el.classList.add('is-visible'); });
      return;
    }
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15, rootMargin: '0px 0px -8% 0px' });
    document.querySelectorAll('.reveal').forEach(function (el) { io.observe(el); });
  })();
</script>

{{- end }}
